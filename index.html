<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klang Valley Transit Map</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon">🚇</div>
                <div class="logo-text">
                    <h1>Klang Valley Rail Map</h1>
                    <span class="subtext">Integrated Transit System</span>
                </div>
            </div>
            <div class="actions">
                <button id="toggle-fullscreen" class="btn btn-secondary">
                    <span class="btn-icon">🖥️</span> Fullscreen
                </button>
            </div>
        </header>
        
        <main class="main-content">
            <!-- Map Display Area -->
            <div id="pdf-container" class="pdf-viewer-container"></div>
        </main>
    </div>
    
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
